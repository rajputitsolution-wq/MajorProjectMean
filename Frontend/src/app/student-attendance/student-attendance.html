<main class="student-page">
  <app-student-sidebar></app-student-sidebar>

  <section class="student-content">
    <div class="section-header">
      <h1>Attendance</h1>
      <p>Review your attendance records for enrolled classes.</p>
    </div>

    <div *ngIf="loading" class="loading-message">Loading attendance...</div>
    <div *ngIf="!loading">
      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
      <div *ngIf="!errorMessage">
        <div *ngIf="attendance.length; else noAttendance">
          <table class="data-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Status</th>
                <th>Remarks</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let item of attendance">
                <td>{{ item.date | date:'mediumDate' }}</td>
                <td>{{ item.status }}</td>
                <td>{{ item.remarks || '-' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
        <ng-template #noAttendance>
          <div class="empty-state">No attendance records available.</div>
        </ng-template>
      </div>
    </div>
  </section>
</main>
