<app-navbar></app-navbar>

<div class="container">
  <h2>Enquiry Form</h2>

  <form #f="ngForm" (ngSubmit)="saveEnquiry()" novalidate>
    <div class="form-grid">

      <div class="form-group">
        <input type="text"
               name="name"
               [(ngModel)]="enquiry.name"
               placeholder=" "
               required>
        <label>Name</label>
      </div>

      <div class="form-group">
        <input type="email"
               name="email"
               [(ngModel)]="enquiry.email"
               placeholder=" "
               required>
        <label>Email</label>
      </div>

      <div class="form-group">
        <input type="text"
               name="phone"
               [(ngModel)]="enquiry.phone"
               placeholder=" "
               required>
        <label>Phone</label>
      </div>

      <div class="form-group">
        <input type="text"
               name="course"
               [(ngModel)]="enquiry.coursename"
               placeholder=" "
               required>
        <label>Course</label>
      </div>

      <div class="form-group full">
        <textarea name="message"
                  [(ngModel)]="enquiry.message"
                  placeholder=" "
                  required></textarea>
        <label>Message</label>
      </div>

    </div>

    <button type="submit" [disabled]="f.invalid">
      Submit
    </button>

  </form>
</div>
