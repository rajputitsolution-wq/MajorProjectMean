<aside class="student-sidebar" [class.collapsed]="sidebar.isCollapsed()">
  <div class="sidebar-header">
    <div class="header-title" *ngIf="!sidebar.isCollapsed()">
      <h2>Student Menu</h2>
      <span>Account</span>
    </div>
    <button class="toggle-btn" (click)="sidebar.toggle()">
      <i class="bx bx-menu"></i>
    </button>
  </div>

  <div class="sidebar-profile" *ngIf="!sidebar.isCollapsed()">
    <p><strong>Student Area</strong></p>
    <p>Dashboard sections</p>
  </div>

  <nav class="student-nav">
    <a routerLink="/student-dashboard" routerLinkActive="active" class="nav-item">
      <i class="bx bx-home"></i>
      <span>Dashboard</span>
    </a>
    <a routerLink="/student-profile" routerLinkActive="active" class="nav-item">
      <i class="bx bx-user"></i>
      <span>Profile</span>
    </a>
    <a routerLink="/student-attendance" routerLinkActive="active" class="nav-item">
      <i class="bx bx-calendar-check"></i>
      <span>Attendance</span>
    </a>
    <a routerLink="/student-schedule" routerLinkActive="active" class="nav-item">
      <i class="bx bx-book"></i>
      <span>Schedule</span>
    </a>
    <a routerLink="/student-subjects" routerLinkActive="active" class="nav-item">
      <i class="bx bx-book-content"></i>
      <span>Subjects</span>
    </a>
    <a routerLink="/student-certificates" routerLinkActive="active" class="nav-item">
      <i class="bx bx-award"></i>
      <span>Certificates</span>
    </a>
    <a routerLink="/student-fees" routerLinkActive="active" class="nav-item">
      <i class="bx bx-credit-card"></i>
      <span>Fees</span>
    </a>
    <a routerLink="/student-notices" routerLinkActive="active" class="nav-item">
      <i class="bx bx-bell"></i>
      <span>Notices</span>
    </a>
    <button class="btn-logout" (click)="logout()">
      <i class="bx bx-log-out"></i>
      <span>Logout</span>
    </button>
  </nav>
</aside>
